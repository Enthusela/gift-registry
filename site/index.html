<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nathan's Wishlist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f1ec;
      color: #2c2c2c;
      line-height: 1.5;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5ddd3;
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
    }

    header h1 { font-size: 1.8rem; font-weight: 700; color: #1a1a2e; margin-bottom: 0.35rem; }
    header p  { color: #999; font-size: 0.9rem; }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1rem 4rem;
    }

    .section-heading {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #bbb;
      margin: 2rem 0 0.8rem;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 0.75rem;
      border: 1px solid #e8e1d9;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .item-name  { font-size: 1.1rem; font-weight: 600; color: #1a1a2e; }
    .item-price { font-size: 1rem; font-weight: 700; color: #2d6a4f; white-space: nowrap; }
    .item-desc  { color: #666; font-size: 0.9rem; margin-bottom: 0.9rem; }

    .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }

    .tag {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .tag-high   { background: #fef9c3; color: #854d0e; }
    .tag-medium { background: #dbeafe; color: #1d4ed8; }
    .tag-low    { background: #f3f4f6; color: #6b7280; }
    .tag-perth  { background: #dcfce7; color: #166534; }
    .tag-online { background: #f0f0ff; color: #4338ca; }
    .tag-lead   { background: #fff1f2; color: #9f1239; }

    .where-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #ccc;
      margin-bottom: 0.4rem;
    }

    .retailer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.35rem 0;
      border-top: 1px solid #f3ede6;
    }

    .retailer-row:first-of-type { border-top: none; }

    .retailer-row a { color: #2d6a4f; font-weight: 500; text-decoration: none; font-size: 0.9rem; }
    .retailer-row a:hover { text-decoration: underline; }
    .retailer-row .r-price { font-size: 0.85rem; color: #aaa; }

    .item-notes { margin-top: 0.75rem; font-size: 0.82rem; color: #bbb; font-style: italic; }
    .item-date  { margin-top: 0.5rem; font-size: 0.7rem; color: #d0c8bf; }

    #status { text-align: center; padding: 4rem 1rem; color: #ccc; }

    @media (max-width: 480px) {
      .card-top { flex-direction: column; align-items: flex-start; }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Nathan's Wishlist</h1>
  <p>Click any retailer link to go straight to the product</p>
</header>

<div class="container">
  <div id="list"><p id="status">Loading...</p></div>
</div>

<script>
  const PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };
  const PRIORITY_LABEL = { high: 'High priority', medium: 'Would love', low: 'Nice to have' };
  const SECTION_LABEL  = { high: 'Most wanted',   medium: 'Would love', low: 'Nice to have' };

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtDate(s) {
    return new Date(s).toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function renderCard(item) {
    const p = item.priority || 'low';

    const retailers = (item.retailers || []).map(r => `
      <div class="retailer-row">
        <a href="${esc(r.url || '#')}" target="_blank" rel="noopener noreferrer">${esc(r.name)}</a>
        ${r.price_aud ? `<span class="r-price">A$${esc(r.price_aud)}</span>` : ''}
      </div>
    `).join('');

    return `
      <div class="card">
        <div class="card-top">
          <span class="item-name">${esc(item.name)}</span>
          ${item.price_aud ? `<span class="item-price">~A$${esc(item.price_aud)}</span>` : ''}
        </div>
        ${item.description ? `<p class="item-desc">${esc(item.description)}</p>` : ''}
        <div class="tags">
          <span class="tag tag-${esc(p)}">${esc(PRIORITY_LABEL[p] || p)}</span>
          ${item.perth_available
            ? '<span class="tag tag-perth">Available in Perth</span>'
            : '<span class="tag tag-online">Online only</span>'}
          ${item.lead_time ? `<span class="tag tag-lead">${esc(item.lead_time)}</span>` : ''}
        </div>
        ${retailers ? `<div><div class="where-label">Where to buy</div>${retailers}</div>` : ''}
        ${item.notes ? `<p class="item-notes">${esc(item.notes)}</p>` : ''}
        ${item.added ? `<p class="item-date">Added ${fmtDate(item.added)}</p>` : ''}
      </div>
    `;
  }

  async function load() {
    const list = document.getElementById('list');
    try {
      const res = await fetch('./data/gifts.json');
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();

      const items = (data.items || []).sort(
        (a, b) => (PRIORITY_ORDER[a.priority] ?? 9) - (PRIORITY_ORDER[b.priority] ?? 9)
      );

      if (!items.length) {
        list.innerHTML = '<p id="status">Nothing here yet — check back soon.</p>';
        return;
      }

      const groups = {};
      items.forEach(item => {
        const p = item.priority || 'low';
        (groups[p] = groups[p] || []).push(item);
      });

      list.innerHTML = ['high', 'medium', 'low']
        .filter(p => groups[p]?.length)
        .map(p => `
          <div class="section-heading">${SECTION_LABEL[p]}</div>
          ${groups[p].map(renderCard).join('')}
        `)
        .join('');

    } catch (e) {
      list.innerHTML = '<p id="status">Could not load the list — try refreshing.</p>';
    }
  }

  load();
</script>
</body>
</html>
