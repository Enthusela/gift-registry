<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nathan's Wishlist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f1ec;
      color: #2c2c2c;
      line-height: 1.5;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5ddd3;
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
    }

    header h1 { font-size: 1.8rem; font-weight: 700; color: #1a1a2e; margin-bottom: 0.35rem; }
    header p  { color: #999; font-size: 0.9rem; }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1rem 4rem;
    }

    .section-heading {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #1a1208;
      margin: 2rem 0 0.8rem;
    }

    /* Card */

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 0.75rem;
      border: 1px solid #e8e1d9;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .item-name  { font-size: 1.1rem; font-weight: 600; color: #1a1a2e; }
    .item-price { font-size: 1rem; font-weight: 700; color: #2d6a4f; white-space: nowrap; }
    .item-desc  { color: #666; font-size: 0.9rem; margin-bottom: 0.9rem; }

    /* Tags */

    .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }

    .tag {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .tag-high   { background: #fef9c3; color: #854d0e; }
    .tag-medium { background: #dbeafe; color: #1d4ed8; }
    .tag-low    { background: #f3f4f6; color: #6b7280; }

    /* Where to buy — parent label */

    .where-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #1a1208;
      margin-bottom: 0.4rem;
    }

    /* Retailers container — indented child block */

    .retailers-container {
      border-left: 2px solid #ede8e0;
      margin-left: 0.2rem;
      padding-left: 0.85rem;
      margin-top: 0.3rem;
    }

    /* Perth / Online sub-labels */

    .retailer-group-label {
      font-size: 0.63rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #5c4033;
      margin: 0.7rem 0 0.2rem;
    }

    .retailer-group-label:first-child { margin-top: 0; }

    /* Individual retailer entry */

    .retailer-entry { padding: 0.3rem 0; border-top: 1px solid #f3ede6; }
    .retailer-entry:first-of-type { border-top: none; }

    .retailer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }

    .retailer-row a { color: #2d6a4f; font-weight: 500; text-decoration: none; font-size: 0.9rem; }
    .retailer-row a:hover { text-decoration: underline; }

    .r-meta { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }
    .r-lead  { font-size: 0.75rem; font-weight: 500; }
    .r-price { font-size: 0.85rem; color: #aaa; }

    .stock-status { font-size: 0.75rem; color: #bbb; margin-top: 0.1rem; }

    /* Purchasing notes */

    .purchasing-notes {
      margin-top: 0.6rem;
      padding: 0.55rem 0.75rem;
      background: #f9f5f0;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #555;
    }

    /* Options (multi-product items) */

    .options-section {
      border: 1px solid #d4ccc3;
      border-radius: 10px;
      padding: 0.75rem;
      margin-top: 0.3rem;
    }

    .options-heading {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1a1208;
      margin-bottom: 0.65rem;
    }

    .options-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .option-block {
      border: 1px solid #ede8e0;
      border-radius: 10px;
      padding: 0.75rem 1rem;
    }

    .option-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.4rem;
      gap: 0.75rem;
    }

    .option-name  { font-size: 0.95rem; font-weight: 600; color: #1a1a2e; }
    .option-price { font-size: 0.9rem; font-weight: 700; color: #2d6a4f; white-space: nowrap; }

    .option-block--preferred {
      border-color: #c8920a;
      background: #fffdf4;
      position: relative;
      overflow: hidden;
    }

    .option-block--preferred::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 55%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 215, 80, 0.35) 50%,
        transparent 100%
      );
      pointer-events: none;
    }

    .option-block--preferred.shine-active::after {
      animation: shine 1.2s ease-in-out forwards;
    }

    @keyframes shine {
      0%   { left: -100%; opacity: 0; }
      15%  { opacity: 1; }
      100% { left: 150%; opacity: 0; }
    }

    .preferred-badge {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      background: #c8920a;
      color: #fff;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      vertical-align: middle;
      margin-left: 0.4rem;
    }

    /* Misc */

    .item-notes { margin-top: 0.75rem; font-size: 0.82rem; color: #888; }
    .item-date  { margin-top: 0.5rem; font-size: 0.7rem; color: #d0c8bf; }

    #status { text-align: center; padding: 4rem 1rem; color: #ccc; }

    @media (max-width: 480px) {
      .card-top { flex-direction: column; align-items: flex-start; }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Nathan's Wishlist</h1>
  <p>Click any retailer link to go straight to the product</p>
</header>

<div class="container">
  <div id="list"><p id="status">Loading...</p></div>
</div>

<script>
  const PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };
  const PRIORITY_LABEL = { high: 'High priority', medium: 'Would love', low: 'Nice to have' };
  const SECTION_LABEL  = { high: 'Most wanted',   medium: 'Would love', low: 'Nice to have' };

  let BIRTHDAY = null;

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtDate(s) {
    return new Date(s).toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function fmtShortDate(s) {
    if (!s) return '';
    return new Date(s).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
  }

  // Returns { bg, text } CSS colors based on how lead time compares to birthday.
  // More buffer = greener; arriving after birthday = red.
  const LEAD_TIERS = [
    { minBuffer: 21, text: '#166534', bg: '#dcfce7' },
    { minBuffer: 14, text: '#15803d', bg: '#d1fae5' },
    { minBuffer:  7, text: '#854d0e', bg: '#fef9c3' },
    { minBuffer:  3, text: '#9a3412', bg: '#ffedd5' },
    { minBuffer:  0, text: '#c2410c', bg: '#fee2e2' },
    { minBuffer: -999, text: '#7f1d1d', bg: '#fecaca' },
  ];

  function leadTimeColors(str) {
    if (!BIRTHDAY || !str) return null;
    let maxDays = 0;
    if (!/in\s*stock/i.test(str)) {
      const nums = str.match(/\d+/g);
      if (!nums) return null;
      maxDays = Math.max(...nums.map(Number));
    }
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const arrival = new Date(today.getTime() + maxDays * 86400000);
    const bday = new Date(BIRTHDAY);
    const buffer = Math.round((bday - arrival) / 86400000);
    return LEAD_TIERS.find(t => buffer >= t.minBuffer) || LEAD_TIERS.at(-1);
  }

  function renderLeadTag(str) {
    if (!str) return '';
    const colors = leadTimeColors(str);
    const style = colors
      ? `style="background:${colors.bg};color:${colors.text}"`
      : 'style="background:#fff1f2;color:#9f1239"';
    return `<span class="tag" ${style}>${esc(str)}</span>`;
  }

  function renderStock(stock) {
    if (!stock) return '';
    const status = stock.status || 'Unknown';
    const s = status.toLowerCase();
    const color = s === 'in stock' ? '#15803d' : s === 'out of stock' ? '#b91c1c' : '#999';
    const checked = stock.checked ? ` · ${fmtShortDate(stock.checked)}` : '';
    return `<div class="stock-status" style="color:${color}">Availability: ${esc(status)}${checked}</div>`;
  }

  function renderRetailerGroup(retailers) {
    const perth  = retailers.filter(r => r.perth_stores);
    const online = retailers.filter(r => !r.perth_stores);
    let html = '';

    function entry(r, showLead) {
      const colors = showLead && r.lead_time ? leadTimeColors(r.lead_time) : null;
      const leadHtml = colors
        ? `<span class="r-lead" style="color:${colors.text}">${esc(r.lead_time)}</span>`
        : '';
      return `
        <div class="retailer-entry">
          <div class="retailer-row">
            <a href="${esc(r.url || '#')}" target="_blank" rel="noopener noreferrer">${esc(r.name)}</a>
            <div class="r-meta">
              ${leadHtml}
              ${r.price_aud ? `<span class="r-price">A$${esc(r.price_aud)}</span>` : ''}
            </div>
          </div>
          ${renderStock(r.stock)}
        </div>
      `;
    }

    if (perth.length) {
      html += '<div class="retailer-group-label">Perth stores</div>';
      html += perth.map(r => entry(r, false)).join('');
    }
    if (online.length) {
      html += '<div class="retailer-group-label">Online</div>';
      html += online.map(r => entry(r, true)).join('');
    }

    return `<div class="retailers-container">${html}</div>`;
  }

  function renderCard(item) {
    const p = item.priority || 'low';

    let priceDisplay = '';
    if (item.price_aud) {
      priceDisplay = `~A$${item.price_aud}`;
    } else if (item.options?.length) {
      const prices = item.options.map(o => o.price_aud).filter(v => v != null);
      if (prices.length) {
        const min = Math.min(...prices), max = Math.max(...prices);
        priceDisplay = min === max ? `~A$${min}` : `A$${min}–$${max}`;
      }
    }

    let buySection = '';
    if (item.options?.length) {
      const sorted = [...item.options].sort((a, b) => {
        if (a.preferred && !b.preferred) return -1;
        if (!a.preferred && b.preferred) return 1;
        return (b.price_aud ?? 0) - (a.price_aud ?? 0);
      });
      const blocks = sorted.map(opt => `
        <div class="option-block${opt.preferred ? ' option-block--preferred' : ''}">
          <div class="option-header">
            <span class="option-name">
              ${esc(opt.name)}
              ${opt.preferred ? '<span class="preferred-badge">Preferred</span>' : ''}
            </span>
            ${opt.price_aud ? `<span class="option-price">~A$${esc(opt.price_aud)}</span>` : ''}
          </div>
          ${opt.retailers?.length ? renderRetailerGroup(opt.retailers) : ''}
          ${opt.purchasing_notes ? `<div class="purchasing-notes">${esc(opt.purchasing_notes)}</div>` : ''}
        </div>
      `).join('');
      buySection = `<div class="options-section"><div class="options-heading">Options</div><div class="options-list">${blocks}</div></div>`;

    } else if (item.retailers?.length) {
      buySection = `
        <div>
          <div class="where-label">Where to buy</div>
          ${renderRetailerGroup(item.retailers)}
          ${item.purchasing_notes ? `<div class="purchasing-notes">${esc(item.purchasing_notes)}</div>` : ''}
        </div>
      `;
    }

    return `
      <div class="card">
        <div class="card-top">
          <span class="item-name">${esc(item.name)}</span>
          ${priceDisplay ? `<span class="item-price">${esc(priceDisplay)}</span>` : ''}
        </div>
        ${item.description ? `<p class="item-desc">${esc(item.description)}</p>` : ''}
        ${item.lead_time ? `<div class="tags">${renderLeadTag(item.lead_time)}</div>` : ''}
        ${buySection}
        ${item.notes ? `<p class="item-notes">${esc(item.notes)}</p>` : ''}
        ${item.added ? `<p class="item-date">Added ${fmtDate(item.added)}</p>` : ''}
      </div>
    `;
  }

  async function load() {
    const list = document.getElementById('list');
    try {
      const res = await fetch('./data/gifts.json');
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();

      BIRTHDAY = data.birthday || null;

      const items = (data.items || []).sort(
        (a, b) => (PRIORITY_ORDER[a.priority] ?? 9) - (PRIORITY_ORDER[b.priority] ?? 9)
      );

      if (!items.length) {
        list.innerHTML = '<p id="status">Nothing here yet — check back soon.</p>';
        return;
      }

      const groups = {};
      items.forEach(item => {
        const p = item.priority || 'low';
        (groups[p] = groups[p] || []).push(item);
      });

      list.innerHTML = ['high', 'medium', 'low']
        .filter(p => groups[p]?.length)
        .map(p => `
          <div class="section-heading">${SECTION_LABEL[p]}</div>
          ${groups[p].map(renderCard).join('')}
        `)
        .join('');

      setupShineObserver();

    } catch (e) {
      list.innerHTML = '<p id="status">Could not load the list — try refreshing.</p>';
    }
  }

  function setupShineObserver() {
    const blocks = document.querySelectorAll('.option-block--preferred');
    if (!blocks.length) return;
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('shine-active');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.3 });
    blocks.forEach(el => {
      el.addEventListener('animationend', () => el.classList.remove('shine-active'), { once: true });
      observer.observe(el);
    });
  }

  load();
</script>
</body>
</html>
